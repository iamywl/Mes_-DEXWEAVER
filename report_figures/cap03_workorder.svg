  <text x="1015" y="556" text-anchor="middle" fill="#fff" font-weight="700" font-size="11">완료</text>

  <text x="252" y="590" class="sm">▸ 실적 입력 시 자동 처리 : ① work_orders.progress_pct 갱신   ② inventory 차감(FIFO 로트)   ③ 불량시 defect_history 기록   ④ 진척률 100%면 status=COMPLETED</text>
