    <text x="252" y="491">11:10</text><text x="350" y="491">PRC-002 도색</text><text x="450" y="491">EQP-002</text><text x="550" y="491">98</text><text x="640" y="491">2</text><text x="740" y="491">DC-01 표면결함</text><text x="900" y="491">홍길동</text>
    <text x="252" y="513">13:32</text><text x="350" y="513">PRC-003 PCB</text><text x="450" y="513">EQP-003</text><text x="550" y="513">67</text><text x="640" y="513">1</text><text x="740" y="513">DC-04 솔더</text><text x="900" y="513">홍길동</text>
  </g>

  <!-- input -->
  <rect x="252" y="538" width="100" height="26" class="input"/>
  <text x="258" y="556" font-size="11" fill="#aaa">양품수량</text>
  <rect x="362" y="538" width="100" height="26" class="input"/>
  <text x="368" y="556" font-size="11" fill="#aaa">불량수량</text>
  <rect x="472" y="538" width="160" height="26" class="input"/>
