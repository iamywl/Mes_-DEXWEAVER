<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 460" font-family="Helvetica, Arial, sans-serif">
  <style>
    .ttl{font-size:13px;font-weight:700;fill:#111}
    .lb{font-size:11px;fill:#111}
    .sm{font-size:10px;fill:#444}
    .axis{stroke:#333;stroke-width:1}
    .ucl{stroke:#c0392b;stroke-width:1.2;stroke-dasharray:6,3}
    .lcl{stroke:#c0392b;stroke-width:1.2;stroke-dasharray:6,3}
    .cl{stroke:#1f3a93;stroke-width:1.2;stroke-dasharray:3,3}
    .pt{fill:#111}
    .ptv{fill:#c0392b}
    .line{stroke:#111;stroke-width:1.2;fill:none}
  </style>

  <text x="440" y="22" text-anchor="middle" class="ttl">Fig. 11  Statistical Process Control — X̄-R Control Chart (FN-038, Western Electric rules)</text>

  <!-- chart frame X-bar -->
  <rect x="60" y="60" width="760" height="180" fill="#fff" stroke="#888"/>
  <text x="55" y="60" text-anchor="end" class="sm">UCL 10.15</text>
  <text x="55" y="150" text-anchor="end" class="sm">CL  10.00</text>
  <text x="55" y="240" text-anchor="end" class="sm">LCL 9.85</text>

  <line x1="60" y1="80" x2="820" y2="80" class="ucl"/>
  <line x1="60" y1="150" x2="820" y2="150" class="cl"/>
  <line x1="60" y1="220" x2="820" y2="220" class="lcl"/>

  <!-- xbar points -->
  <polyline points="80,160 120,148 160,140 200,158 240,142 280,150 320,138 360,144 400,160 440,135 480,128 520,118 560,90 600,140 640,150 680,148 720,142 760,150 800,158" class="line"/>

