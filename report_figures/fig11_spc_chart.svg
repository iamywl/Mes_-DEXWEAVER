  <text x="60" y="258" class="sm">subgroup #1</text>
  <text x="800" y="258" text-anchor="end" class="sm">#19</text>

  <!-- R chart -->
  <rect x="60" y="280" width="760" height="100" fill="#fff" stroke="#888"/>
  <line x1="60" y1="296" x2="820" y2="296" class="ucl"/>
  <line x1="60" y1="340" x2="820" y2="340" class="cl"/>
  <line x1="60" y1="372" x2="820" y2="372" class="lcl"/>
  <text x="55" y="298" text-anchor="end" class="sm">UCL 0.32</text>
  <text x="55" y="343" text-anchor="end" class="sm">R̄  0.16</text>
  <text x="55" y="375" text-anchor="end" class="sm">LCL 0.0</text>

  <polyline points="80,355 120,348 160,340 200,344 240,338 280,332 320,330 360,338 400,344 440,330 480,322 520,316 560,308 600,330 640,338 680,340 720,335 760,342 800,348" class="line"/>

  <!-- legend -->
  <rect x="60" y="400" width="760" height="50" fill="#fff" stroke="#222"/>
  <text x="70" y="418" class="sm">Western Electric rules implemented :  WE-1 (1 pt &gt; 3σ)  ·  WE-2 (9 consec. one side)  ·  WE-3 (6 consec. trending)  ·  WE-4 (14 alternating)</text>
  <text x="70" y="432" class="sm">Cp = (USL − LSL) / 6σ_within = 1.90    Cpk = min(Cpu, Cpl) = 1.86    grade A    Shapiro-Wilk p = 0.45 (normal)    →  /api/quality/cpk</text>
  <text x="70" y="446" class="sm">Violations trigger CAPA workflow (FN-041) and WebSocket alert (FN-046, severity = WARNING).</text>
