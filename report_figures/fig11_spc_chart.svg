    <circle cx="160" cy="140" r="3" class="pt"/>
    <circle cx="200" cy="158" r="3" class="pt"/>
    <circle cx="240" cy="142" r="3" class="pt"/>
    <circle cx="280" cy="150" r="3" class="pt"/>
    <circle cx="320" cy="138" r="3" class="pt"/>
    <circle cx="360" cy="144" r="3" class="pt"/>
    <circle cx="400" cy="160" r="3" class="pt"/>
    <circle cx="440" cy="135" r="3" class="pt"/>
    <circle cx="480" cy="128" r="3" class="pt"/>
    <circle cx="520" cy="118" r="3" class="pt"/>
    <circle cx="560" cy="90" r="4" class="ptv"/>
    <text x="560" y="80" text-anchor="middle" class="sm" fill="#c0392b">WE-1 violation</text>
    <circle cx="600" cy="140" r="3" class="pt"/>
    <circle cx="640" cy="150" r="3" class="pt"/>
    <circle cx="680" cy="148" r="3" class="pt"/>
    <circle cx="720" cy="142" r="3" class="pt"/>
