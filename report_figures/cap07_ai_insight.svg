  <text x="252" y="615" class="lb" font-weight="700">Σ shap = +0.21  →  P(defect) = sigmoid(logit + 0.21) = 0.34</text>
  <text x="252" y="633" class="sm">→ AI는 "왜?"를 함께 보여준다.   현장 작업자의 신뢰가 의사결정 도구로 변환되는 핵심 포인트.</text>

