<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 460" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arr7" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#222"/>
    </marker>
  </defs>
  <style>
    .ttl{font-size:13px;font-weight:700;fill:#111}
    .lb{font-size:11px;fill:#111}
    .sm{font-size:10px;fill:#444}
    .stage{fill:#eaf1fb;stroke:#1f3a93;stroke-width:1.2}
    .data{fill:#f0f6f0;stroke:#1e7c39;stroke-width:1.2}
    .out{fill:#fef7f0;stroke:#c0392b;stroke-width:1.2}
    .arr{stroke:#222;stroke-width:1.2;fill:none}
    .alert{fill:#fff8d8;stroke:#b58800}
  </style>

  <text x="440" y="22" text-anchor="middle" class="ttl">Fig. 7  Equipment Failure Prediction (FN-034) — IsolationForest Anomaly + LSTM RUL</text>

  <rect x="30" y="50" width="160" height="60" rx="4" class="data"/>
  <text x="110" y="72" text-anchor="middle" class="lb">equip_sensors</text>
  <text x="110" y="88" text-anchor="middle" class="sm">vibration · temperature</text>
  <text x="110" y="102" text-anchor="middle" class="sm">current · pressure (1 Hz)</text>

  <rect x="220" y="50" width="160" height="60" rx="4" class="stage"/>
  <text x="300" y="72" text-anchor="middle" class="lb">Window slicer</text>
  <text x="300" y="88" text-anchor="middle" class="sm">60 s sliding window</text>
  <text x="300" y="102" text-anchor="middle" class="sm">overlap 30 s</text>

  <rect x="410" y="40" width="160" height="80" rx="4" class="stage"/>
  <text x="490" y="60" text-anchor="middle" class="lb">IsolationForest</text>
  <text x="490" y="76" text-anchor="middle" class="sm">unsupervised</text>
  <text x="490" y="92" text-anchor="middle" class="sm">contamination = 0.05</text>
  <text x="490" y="108" text-anchor="middle" class="sm">anomaly_score ∈ [0,1]</text>

  <rect x="600" y="40" width="160" height="80" rx="4" class="stage"/>
  <text x="680" y="60" text-anchor="middle" class="lb">LSTM RUL Regressor</text>
  <text x="680" y="76" text-anchor="middle" class="sm">2-layer · 64 units</text>
  <text x="680" y="92" text-anchor="middle" class="sm">predict remaining</text>
  <text x="680" y="108" text-anchor="middle" class="sm">useful life (hours)</text>

  <line x1="190" y1="80" x2="220" y2="80" class="arr" marker-end="url(#arr7)"/>
  <line x1="380" y1="80" x2="410" y2="80" class="arr" marker-end="url(#arr7)"/>
  <line x1="570" y1="80" x2="600" y2="80" class="arr" marker-end="url(#arr7)"/>

  <!-- ai_forecasts -->
  <rect x="600" y="140" width="160" height="40" rx="4" class="out"/>
  <text x="680" y="158" text-anchor="middle" class="lb">ai_forecasts (DB)</text>
  <text x="680" y="172" text-anchor="middle" class="sm">model='IF_LSTM'</text>
  <line x1="680" y1="120" x2="680" y2="140" class="arr" marker-end="url(#arr7)"/>

  <!-- alert flow -->
  <rect x="600" y="200" width="160" height="40" rx="4" class="alert"/>
  <text x="680" y="218" text-anchor="middle" class="lb">WS push → operator</text>
  <text x="680" y="232" text-anchor="middle" class="sm">FN-046 channel=EQUIPMENT</text>
  <line x1="680" y1="180" x2="680" y2="200" class="arr" marker-end="url(#arr7)"/>

  <!-- chart -->
  <text x="40" y="270" class="lb">Anomaly score vs threshold (rolling 24 h, EQP-003)</text>
  <rect x="40" y="280" width="500" height="160" fill="#fff" stroke="#888"/>
  <line x1="40" y1="350" x2="540" y2="350" stroke="#c0392b" stroke-dasharray="5,3"/>
  <text x="545" y="354" class="sm">threshold 0.6</text>
  <polyline points="40,415 80,410 120,408 160,402 200,395 240,390 280,378 320,360 360,345 400,332 440,315 480,295 520,280" fill="none" stroke="#1f3a93" stroke-width="1.6"/>
  <text x="42" y="438" class="sm">00:00</text>
  <text x="280" y="438" text-anchor="middle" class="sm">12:00</text>
  <text x="538" y="438" text-anchor="end" class="sm">24:00</text>
  <text x="36" y="288" text-anchor="end" class="sm">1.0</text>
  <text x="36" y="438" text-anchor="end" class="sm">0.0</text>

  <!-- callout -->
  <rect x="560" y="280" width="290" height="160" rx="3" fill="#fff" stroke="#222"/>
  <text x="570" y="298" class="lb">Decision logic</text>
  <text x="570" y="316" class="sm">if anomaly_score &gt; 0.6  AND  RUL &lt; 48 h</text>
  <text x="570" y="330" class="sm">     → severity = CRITICAL  → push notification</text>
  <text x="570" y="348" class="sm">elif anomaly_score &gt; 0.4</text>
  <text x="570" y="362" class="sm">     → severity = WARNING  → schedule inspection</text>
  <text x="570" y="380" class="sm">else: continue monitoring</text>
  <text x="570" y="408" class="sm">→ recommendation written into ai_forecasts</text>
  <text x="570" y="422" class="sm">→ CMMS work order auto-drafted (Phase-2 FN-049)</text>
</svg>
