  <use href="#ic-prophet" x="40"  y="290" width="60" height="60"/>
  <use href="#ic-xgboost" x="200" y="290" width="60" height="60"/>
  <use href="#ic-sklearn" x="360" y="290" width="60" height="60"/>
  <use href="#ic-ortools" x="520" y="290" width="60" height="60"/>
