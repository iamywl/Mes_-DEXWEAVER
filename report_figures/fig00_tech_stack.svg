  </style>

  <text x="460" y="22" text-anchor="middle" class="ttl">Fig. 0  Tech Stack Overview — open-source &amp; CNCF projects used by DEXWEAVER MES</text>

  <!-- Frontend group -->
  <rect x="20" y="50" width="280" height="180" rx="6" class="gbox"/>
  <text x="34" y="70" class="grp">Frontend</text>
  <use href="#ic-react"    x="40"  y="90" width="56" height="56"/>
  <use href="#ic-vite"     x="120" y="90" width="56" height="56"/>
  <use href="#ic-tailwind" x="200" y="90" width="56" height="56"/>
  <text x="68"  y="160" class="lb">React 19</text><text x="68"  y="174" class="sm">UI library</text>
  <text x="148" y="160" class="lb">Vite 5</text>  <text x="148" y="174" class="sm">build tool</text>
  <text x="228" y="160" class="lb">Tailwind 4</text><text x="228" y="174" class="sm">utility CSS</text>

  <!-- Backend group -->
  <rect x="320" y="50" width="280" height="180" rx="6" class="gbox"/>
  <text x="334" y="70" class="grp">Backend / Database</text>
  <use href="#ic-fastapi"  x="340" y="90" width="56" height="56"/>
  <use href="#ic-python"   x="420" y="90" width="56" height="56"/>
  <use href="#ic-postgres" x="500" y="90" width="56" height="56"/>
  <text x="368" y="160" class="lb">FastAPI</text><text x="368" y="174" class="sm">async REST</text>
  <text x="448" y="160" class="lb">Python 3.9</text><text x="448" y="174" class="sm">runtime</text>
  <text x="528" y="160" class="lb">PostgreSQL 15</text><text x="528" y="174" class="sm">RDBMS · ACID</text>

  <!-- Infra group -->
  <rect x="620" y="50" width="280" height="180" rx="6" class="gbox"/>
