  <text x="70"  y="365" class="lb">Prophet</text>
  <text x="70"  y="380" class="sm">FN-018 Demand forecast</text>
  <text x="70"  y="394" class="sm">trend + season + holiday</text>

  <text x="230" y="365" class="lb">XGBoost</text>
  <text x="230" y="380" class="sm">FN-028 Defect predict</text>
  <text x="230" y="394" class="sm">gradient boosting trees</text>

  <text x="390" y="365" class="lb">scikit-learn</text>
  <text x="390" y="380" class="sm">FN-034 Failure predict</text>
  <text x="390" y="394" class="sm">IsolationForest anomaly</text>

