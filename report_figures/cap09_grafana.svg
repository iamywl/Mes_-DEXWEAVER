<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 700" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <symbol id="ic-grafana" viewBox="-50 -50 100 100"><circle r="38" fill="#F46800"/><path d="M-22,4 H22 L18,22 H-18 Z" fill="#fff"/><rect x="-3" y="-22" width="6" height="22" fill="#fff"/><circle cx="0" cy="-26" r="6" fill="#fff"/></symbol>
    <symbol id="ic-prometheus" viewBox="-50 -50 100 100"><path d="M0,-44 Q15,-20 22,-8 Q30,8 22,24 Q12,40 -12,40 Q-30,28 -28,8 Q-26,-12 -10,-22 Q0,-12 -4,0 Q-2,-22 0,-44 Z" fill="#E6522C"/><rect x="-22" y="14" width="44" height="6" fill="#111"/><circle cx="0" cy="6" r="6" fill="#fff"/></symbol>
  </defs>
  <style>
    .ttl{font-size:13px;font-weight:700;fill:#111}
    .lb{font-size:11px;fill:#eee}
    .sm{font-size:10px;fill:#aaa}
    .term{fill:#161719}
    .panel{fill:#21232b;stroke:#3d3f46}
    .gw{stroke:#F46800}
    .gG{stroke:#27c93f}
    .gB{stroke:#61DAFB}
    .gR{stroke:#ff7575}
  </style>

  <text x="550" y="22" text-anchor="middle" class="ttl">Capture 9.  Grafana Dashboard  —  Prometheus 메트릭 (latency / 5xx / OEE / pod CPU)</text>
  <rect x="20" y="40" width="1060" height="640" class="term" rx="6"/>

  <!-- top bar -->
  <use href="#ic-grafana" x="36" y="48" width="32" height="32"/>
  <text x="78" y="68" class="lb" font-size="13" font-weight="700">DEXWEAVER MES — Production Overview</text>
  <use href="#ic-prometheus" x="940" y="48" width="28" height="28"/>
  <text x="975" y="68" class="sm">data source : prometheus</text>
  <text x="975" y="82" class="sm">refresh : 10s · last 6h</text>

  <!-- panels grid -->
  <!-- p1 -->
  <rect x="40" y="100" width="330" height="170" class="panel"/>
  <text x="52" y="120" class="lb">API latency  p50 / p95 / p99 (ms)</text>
  <polyline points="60,240 100,232 140,228 180,210 220,218 260,206 300,210 340,202" fill="none" class="gG" stroke-width="2"/>
  <polyline points="60,250 100,240 140,236 180,228 220,232 260,222 300,224 340,218" fill="none" class="gB" stroke-width="2"/>
  <polyline points="60,260 100,256 140,252 180,242 220,250 260,236 300,240 340,234" fill="none" class="gR" stroke-width="2"/>
  <text x="60" y="262" class="sm">p50 = 18 ms</text>
  <text x="160" y="262" class="sm">p95 = 78 ms</text>
  <text x="260" y="262" class="sm">p99 = 180 ms</text>

  <!-- p2 -->
  <rect x="380" y="100" width="330" height="170" class="panel"/>
  <text x="392" y="120" class="lb">Request rate  (req / s)</text>
  <g fill="#F46800">
    <rect x="400" y="220" width="22" height="40"/>
    <rect x="425" y="210" width="22" height="50"/>
    <rect x="450" y="195" width="22" height="65"/>
    <rect x="475" y="180" width="22" height="80"/>
    <rect x="500" y="170" width="22" height="90"/>
    <rect x="525" y="160" width="22" height="100"/>
    <rect x="550" y="155" width="22" height="105"/>
    <rect x="575" y="170" width="22" height="90"/>
    <rect x="600" y="190" width="22" height="70"/>
    <rect x="625" y="200" width="22" height="60"/>
    <rect x="650" y="210" width="22" height="50"/>
  </g>

  <!-- p3 5xx -->
  <rect x="720" y="100" width="340" height="170" class="panel"/>
  <text x="732" y="120" class="lb">5xx error rate</text>
  <text x="732" y="170" class="lb" font-size="32" font-weight="700" fill="#27c93f">0.02 %</text>
  <text x="732" y="195" class="sm">SLO 0.5 % · OK</text>
  <polyline points="730,250 770,248 810,250 850,246 890,252 930,248 970,247 1010,250" fill="none" class="gG" stroke-width="2"/>

  <!-- p4 oee -->
  <rect x="40" y="280" width="330" height="170" class="panel"/>
  <text x="52" y="300" class="lb">OEE (실시간 — Promtail scrape)</text>
  <text x="60" y="350" class="lb" font-size="32" font-weight="700" fill="#27c93f">82.0 %</text>
  <text x="60" y="378" class="sm">A 93.8 %  ·  P 93.3 %  ·  Q 97.1 %</text>
  <polyline points="60,420 100,418 140,415 180,408 220,402 260,400 300,396 340,398" fill="none" class="gG" stroke-width="2"/>

  <!-- p5 pod cpu -->
  <rect x="380" y="280" width="330" height="170" class="panel"/>
  <text x="392" y="300" class="lb">Pod CPU usage  (mes-api)</text>
  <polyline points="400,420 440,408 480,402 520,388 560,392 600,378 640,372 680,360" fill="none" class="gB" stroke-width="2"/>
  <polyline points="400,425 440,415 480,410 520,398 560,402 600,388 640,386 680,372" fill="none" class="gR" stroke-width="2" stroke-dasharray="4,2"/>
  <text x="400" y="440" class="sm">avg 42 %</text>
  <text x="500" y="440" class="sm">peak 68 %</text>

  <!-- p6 pod mem -->
  <rect x="720" y="280" width="340" height="170" class="panel"/>
  <text x="732" y="300" class="lb">Pod Memory (mes-api · postgres)</text>
  <rect x="740" y="320" width="200" height="20" fill="#3d3f46"/>
  <rect x="740" y="320" width="120" height="20" fill="#61DAFB"/>
  <text x="740" y="354" class="sm">mes-api : 240 / 400 MiB</text>
  <rect x="740" y="370" width="200" height="20" fill="#3d3f46"/>
  <rect x="740" y="370" width="160" height="20" fill="#F46800"/>
  <text x="740" y="404" class="sm">postgres : 1.6 / 2 GiB</text>
  <rect x="740" y="420" width="200" height="20" fill="#3d3f46"/>
  <rect x="740" y="420" width="60"  height="20" fill="#27c93f"/>
  <text x="740" y="438" class="sm">prometheus : 480 / 1.6 GiB</text>

  <!-- p7 alerts -->
  <rect x="40" y="460" width="1020" height="200" class="panel"/>
  <text x="52" y="480" class="lb">Alerts (Alertmanager)</text>
  <g font-size="11" fill="#eee">
    <text x="60" y="510">⚠ 13:38   EquipmentVibrationHigh    EQP-003   anomaly_score = 0.62   →   PagerDuty (oncall)</text>
    <text x="60" y="532">⚠ 13:25   SPCRuleViolation           ITM-PROD-A1 #13 1pt &gt; 3σ          →   CAPA-20260420-005</text>
    <text x="60" y="554">⚠ 12:55   InventoryBelowSafetyStock  RAW-D2 (24 / 50 ea)               →   Slack #procurement</text>
    <text x="60" y="576">ℹ 12:30   DeployRolloutSucceeded     mes-api 845d9b6c8c                →   Telegram</text>
    <text x="60" y="598">⚠ 11:48   APILatencyP99High          api-845d9b6c8c-jh4kr p99 = 412 ms →   investigated, ok</text>
    <text x="60" y="620">⚠ 09:22   PodRestart                 mes-api-845d9b6c8c-qz8mn          →   OOM, memory limit ↑</text>
  </g>
</svg>
