<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 600" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#222"/>
    </marker>
    <marker id="arrL" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#666"/>
    </marker>

    <symbol id="ic-react" viewBox="-50 -50 100 100">
      <circle r="6" fill="#61DAFB"/>
      <ellipse rx="42" ry="16" fill="none" stroke="#61DAFB" stroke-width="3"/>
      <ellipse rx="42" ry="16" fill="none" stroke="#61DAFB" stroke-width="3" transform="rotate(60)"/>
      <ellipse rx="42" ry="16" fill="none" stroke="#61DAFB" stroke-width="3" transform="rotate(120)"/>
    </symbol>
    <symbol id="ic-tailwind" viewBox="-50 -50 100 100">
      <path d="M-44,-6 Q-22,-32 0,-12 Q22,8 44,-12 Q22,16 0,-4 Q-22,-26 -44,-6 Z" fill="#38BDF8"/>
      <path d="M-44,18 Q-22,-8 0,12 Q22,32 44,12 Q22,40 0,20 Q-22,-2 -44,18 Z" fill="#38BDF8" opacity="0.8"/>
    </symbol>
    <symbol id="ic-vite" viewBox="-50 -50 100 100">
      <polygon points="-32,-30 32,-30 0,40" fill="#646CFF"/>
      <polygon points="-14,-12 18,-30 4,18 -8,30" fill="#FFCA28"/>
    </symbol>
    <symbol id="ic-fastapi" viewBox="-50 -50 100 100">
      <circle r="42" fill="#009688"/>
      <polygon points="-12,-30 18,-6 -2,-2 12,30 -18,6 2,2" fill="#fff"/>
    </symbol>
    <symbol id="ic-python" viewBox="-50 -50 100 100">
      <path d="M0,-40 Q-30,-40 -30,-15 V-5 H10 V0 H-30 Q-40,0 -40,10 V25 Q-40,40 -15,40 H5 V25 Q5,15 15,15 H35 Q40,15 40,5 V-15 Q40,-40 0,-40 Z" fill="#3776AB"/>
      <circle cx="-18" cy="-25" r="4" fill="#fff"/>
      <path d="M0,40 Q30,40 30,15 V5 H-10 V0 H30 Q40,0 40,-10 V-25 Q40,-40 15,-40 H-5 V-25 Q-5,-15 -15,-15 H-35 Q-40,-15 -40,-5 V15 Q-40,40 0,40 Z" fill="#FFD43B" opacity="0.95"/>
      <circle cx="18" cy="25" r="4" fill="#fff"/>
    </symbol>
    <symbol id="ic-postgres" viewBox="-50 -50 100 100">
      <ellipse cx="0" cy="0" rx="40" ry="38" fill="#336791"/>
      <ellipse cx="-12" cy="-30" rx="10" ry="14" fill="#336791"/>
      <ellipse cx="12" cy="-30" rx="10" ry="14" fill="#336791"/>
      <circle cx="-10" cy="-8" r="5" fill="#fff"/>
      <circle cx="-10" cy="-8" r="2" fill="#111"/>
      <path d="M-30,15 Q-15,30 0,28 Q15,30 30,15" fill="none" stroke="#fff" stroke-width="2.5"/>
      <path d="M22,5 Q35,15 30,25" fill="none" stroke="#fff" stroke-width="2.5"/>
    </symbol>
    <symbol id="ic-k8s" viewBox="-50 -50 100 100">
      <polygon points="0,-44 38,-22 38,22 0,44 -38,22 -38,-22" fill="#326CE5" stroke="#fff" stroke-width="3"/>
      <circle cx="0" cy="0" r="14" fill="none" stroke="#fff" stroke-width="2.5"/>
      <g stroke="#fff" stroke-width="2.5">
        <line x1="0" y1="-14" x2="0" y2="-32"/>
        <line x1="14" y1="0" x2="32" y2="0"/>
        <line x1="0" y1="14" x2="0" y2="32"/>
        <line x1="-14" y1="0" x2="-32" y2="0"/>
        <line x1="10" y1="-10" x2="22" y2="-22"/>
        <line x1="-10" y1="10" x2="-22" y2="22"/>
      </g>
    </symbol>
    <symbol id="ic-cilium" viewBox="-50 -50 100 100">
      <ellipse cx="0" cy="5" rx="34" ry="28" fill="#F8C517"/>
      <rect x="-30" y="-12" width="60" height="8" fill="#111"/>
      <rect x="-30" y="6"  width="60" height="8" fill="#111"/>
      <rect x="-30" y="22" width="60" height="8" fill="#111"/>
      <ellipse cx="-22" cy="-18" rx="18" ry="10" fill="#fff" opacity="0.8" transform="rotate(-25)"/>
      <ellipse cx="22"  cy="-18" rx="18" ry="10" fill="#fff" opacity="0.8" transform="rotate( 25)"/>
      <circle cx="0" cy="-25" r="4" fill="#111"/>
    </symbol>
    <symbol id="ic-jenkins" viewBox="-50 -50 100 100">
      <ellipse cx="0" cy="-12" rx="22" ry="26" fill="#F0DDB1"/>
      <path d="M-22,-18 Q-22,-44 0,-44 Q22,-44 22,-18 Q22,-30 0,-32 Q-22,-30 -22,-18 Z" fill="#111"/>
      <circle cx="-9"  cy="-12" r="2.5" fill="#111"/>
      <circle cx="9"   cy="-12" r="2.5" fill="#111"/>
      <path d="M-22,18 Q0,28 22,18 L24,42 L-24,42 Z" fill="#D33833"/>
      <rect x="-3" y="20" width="6" height="22" fill="#fff"/>
    </symbol>
    <symbol id="ic-prometheus" viewBox="-50 -50 100 100">
      <path d="M0,-44 Q15,-20 22,-8 Q30,8 22,24 Q12,40 -12,40 Q-30,28 -28,8 Q-26,-12 -10,-22 Q0,-12 -4,0 Q-2,-22 0,-44 Z" fill="#E6522C"/>
      <rect x="-22" y="14" width="44" height="6" fill="#111"/>
      <circle cx="0" cy="6" r="6" fill="#fff"/>
    </symbol>
    <symbol id="ic-grafana" viewBox="-50 -50 100 100">
      <circle r="38" fill="#F46800"/>
      <path d="M-22,4 H22 L18,22 H-18 Z" fill="#fff"/>
      <rect x="-3" y="-22" width="6" height="22" fill="#fff"/>
      <circle cx="0" cy="-26" r="6" fill="#fff"/>
    </symbol>
    <symbol id="ic-prophet" viewBox="-50 -50 100 100">
      <rect x="-40" y="-40" width="80" height="80" rx="8" fill="#1877F2"/>
      <polyline points="-30,28 -10,8 5,18 28,-22" fill="none" stroke="#fff" stroke-width="4"/>
      <text x="0" y="-26" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">F</text>
    </symbol>
    <symbol id="ic-xgboost" viewBox="-50 -50 100 100">
      <rect x="-40" y="-40" width="80" height="80" rx="6" fill="#0a4f3a"/>
      <text x="0" y="6" text-anchor="middle" font-size="22" font-weight="800" fill="#9ee493">XGB</text>
    </symbol>
    <symbol id="ic-sklearn" viewBox="-50 -50 100 100">
      <circle r="40" fill="#3499CD"/>
      <text x="0" y="-2" text-anchor="middle" font-size="14" font-weight="700" fill="#F7931E">scikit</text>
      <text x="0" y="14" text-anchor="middle" font-size="14" font-weight="700" fill="#F7931E">learn</text>
    </symbol>
  </defs>
  <style>
    .ttl{font-size:13px;font-weight:700;fill:#111}
    .lbl{font-size:11px;fill:#111}
    .sub{font-size:10px;fill:#444}
    .layer{font-size:11px;font-weight:700;fill:#666;letter-spacing:1px}
    .box{fill:#fff;stroke:#222;stroke-width:1.2}
    .boxA{fill:#f4f6fb;stroke:#1f3a93;stroke-width:1.4}
    .boxB{fill:#fef7f0;stroke:#c0392b;stroke-width:1.4}
    .boxC{fill:#f0f6f0;stroke:#1e7c39;stroke-width:1.4}
    .boxD{fill:#f6f0f6;stroke:#6f3a8c;stroke-width:1.4}
    .boxK{fill:#eaf0fc;stroke:#326CE5;stroke-width:1.4}
    .swim{fill:none;stroke:#bbb;stroke-dasharray:3,3}
    .arr{stroke:#222;stroke-width:1.2;fill:none}
    .arrL{stroke:#666;stroke-width:1;fill:none;stroke-dasharray:4,3}
  </style>

  <text x="460" y="22" text-anchor="middle" class="ttl">Fig. 1  DEXWEAVER MES — Cloud-Native Three-Tier Architecture (with OSS stack)</text>

  <line x1="40" y1="60"  x2="880" y2="60"  class="swim"/>
  <line x1="40" y1="170" x2="880" y2="170" class="swim"/>
  <line x1="40" y1="310" x2="880" y2="310" class="swim"/>
  <line x1="40" y1="440" x2="880" y2="440" class="swim"/>

  <text x="48" y="78"  class="layer">CLIENT  TIER</text>
  <text x="48" y="188" class="layer">APPLICATION  TIER (REST API)</text>
  <text x="48" y="328" class="layer">DATA  &amp;  AI  TIER</text>
  <text x="48" y="458" class="layer">INFRASTRUCTURE  TIER (KUBERNETES)</text>

  <!-- CLIENT -->
  <rect x="120" y="90" width="200" height="60" rx="4" class="boxA"/>
  <use href="#ic-react" x="130" y="100" width="42" height="42"/>
  <use href="#ic-vite"  x="170" y="100" width="42" height="42"/>
  <use href="#ic-tailwind" x="210" y="100" width="42" height="42"/>
  <text x="270" y="115" text-anchor="middle" class="lbl">SPA Frontend</text>
  <text x="270" y="130" text-anchor="middle" class="sub">React 19 + Vite + Tailwind 4</text>
  <text x="270" y="144" text-anchor="middle" class="sub">App.jsx · 14 menus</text>

  <rect x="350" y="90" width="200" height="60" rx="4" class="boxA"/>
  <use href="#ic-react" x="362" y="100" width="42" height="42"/>
  <text x="500" y="115" text-anchor="middle" class="lbl">Operator Tablet (HMI)</text>
  <text x="500" y="130" text-anchor="middle" class="sub">PWA · barcode · offline cache</text>
  <text x="500" y="144" text-anchor="middle" class="sub">touch-optimised</text>

  <rect x="580" y="90" width="200" height="60" rx="4" class="boxA"/>
  <use href="#ic-grafana" x="590" y="100" width="42" height="42"/>
  <text x="730" y="115" text-anchor="middle" class="lbl">Manager Dashboard</text>
  <text x="730" y="130" text-anchor="middle" class="sub">real-time KPI · OEE</text>
  <text x="730" y="144" text-anchor="middle" class="sub">drill-down SVG charts</text>

  <!-- APPLICATION -->
  <rect x="100" y="200" width="700" height="100" rx="4" class="boxB"/>
  <use href="#ic-fastapi" x="115" y="210" width="42" height="42"/>
  <use href="#ic-python"  x="155" y="210" width="42" height="42"/>
  <text x="450" y="222" text-anchor="middle" class="lbl">FastAPI Gateway · Python 3.9 · 46 REST endpoints · JWT-secured</text>

  <g font-size="10" fill="#222">
    <rect x="200" y="248" width="110" height="44" rx="3" class="box"/>
    <text x="255" y="266" text-anchor="middle">mes_auth</text>
    <text x="255" y="280" text-anchor="middle" fill="#666">FN-001~003</text>

    <rect x="320" y="248" width="110" height="44" rx="3" class="box"/>
    <text x="375" y="266" text-anchor="middle">mes_items / bom</text>
    <text x="375" y="280" text-anchor="middle" fill="#666">FN-004~009</text>

    <rect x="440" y="248" width="110" height="44" rx="3" class="box"/>
    <text x="495" y="266" text-anchor="middle">mes_work / plan</text>
    <text x="495" y="280" text-anchor="middle" fill="#666">FN-015~024</text>

    <rect x="560" y="248" width="110" height="44" rx="3" class="box"/>
    <text x="615" y="266" text-anchor="middle">mes_quality / spc</text>
    <text x="615" y="280" text-anchor="middle" fill="#666">FN-025~040</text>

    <rect x="680" y="248" width="110" height="44" rx="3" class="box"/>
    <text x="735" y="266" text-anchor="middle">mes_oee / equip</text>
    <text x="735" y="280" text-anchor="middle" fill="#666">FN-032~045</text>
  </g>

  <!-- DATA + AI -->
  <rect x="100" y="340" width="320" height="90" rx="4" class="boxC"/>
  <use href="#ic-postgres" x="120" y="350" width="48" height="48"/>
  <text x="290" y="360" text-anchor="middle" class="lbl">PostgreSQL 15  ·  21 tables (Phase-0)</text>
  <text x="290" y="378" text-anchor="middle" class="sub">items · bom · work_orders · work_results</text>
  <text x="290" y="392" text-anchor="middle" class="sub">inventory · inspections · equip_status_log</text>
  <text x="290" y="408" text-anchor="middle" class="sub">ACID · psycopg2 · alembic migration</text>

  <rect x="440" y="340" width="380" height="90" rx="4" class="boxD"/>
  <use href="#ic-prophet"  x="450" y="350" width="40" height="40"/>
  <use href="#ic-xgboost"  x="495" y="350" width="40" height="40"/>
  <use href="#ic-sklearn"  x="540" y="350" width="40" height="40"/>
  <text x="700" y="360" text-anchor="middle" class="lbl">AI / ML Inference Modules</text>
  <text x="700" y="378" text-anchor="middle" class="sub">Prophet (demand) · XGBoost (defect) · IsolationForest (failure)</text>
  <text x="700" y="392" text-anchor="middle" class="sub">SHAP explainability · OR-Tools CP-SAT scheduling</text>
  <text x="700" y="408" text-anchor="middle" class="sub">graceful fallback when libraries missing</text>

  <!-- INFRA -->
  <rect x="100" y="470" width="700" height="110" rx="4" class="boxK"/>
  <use href="#ic-k8s"        x="115" y="478" width="50" height="50"/>
  <use href="#ic-cilium"     x="170" y="478" width="50" height="50"/>
  <use href="#ic-jenkins"    x="225" y="478" width="50" height="50"/>
  <use href="#ic-prometheus" x="280" y="478" width="46" height="46"/>
  <use href="#ic-grafana"    x="330" y="478" width="46" height="46"/>
  <text x="600" y="495" text-anchor="middle" class="lbl">Kubernetes v1.30+  ·  Cilium eBPF CNI  ·  Jenkins GitOps  ·  Prometheus + Grafana</text>
  <text x="220" y="548" text-anchor="middle" class="sub">Deployment · StatefulSet</text>
  <text x="220" y="562" text-anchor="middle" class="sub">RollingUpdate (0 downtime)</text>
  <text x="450" y="548" text-anchor="middle" class="sub">ConfigMap source mount</text>
  <text x="450" y="562" text-anchor="middle" class="sub">→ build-time saved 90%</text>
  <text x="680" y="548" text-anchor="middle" class="sub">NetworkPolicy (L3/4/7)</text>
  <text x="680" y="562" text-anchor="middle" class="sub">Pod-to-Pod whitelist</text>

  <!-- arrows -->
  <line x1="270" y1="150" x2="270" y2="200" class="arr" marker-end="url(#arr)"/>
  <line x1="500" y1="150" x2="500" y2="200" class="arr" marker-end="url(#arr)"/>
  <line x1="730" y1="150" x2="730" y2="200" class="arr" marker-end="url(#arr)"/>

  <line x1="290" y1="300" x2="290" y2="340" class="arr" marker-end="url(#arr)"/>
  <line x1="700" y1="300" x2="700" y2="340" class="arr" marker-end="url(#arr)"/>

  <line x1="290" y1="430" x2="290" y2="470" class="arrL" marker-end="url(#arrL)"/>
  <line x1="700" y1="430" x2="700" y2="470" class="arrL" marker-end="url(#arrL)"/>
</svg>
