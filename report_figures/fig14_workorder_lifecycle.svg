<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 380" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arr14" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#222"/>
    </marker>
  </defs>
  <style>
    .ttl{font-size:13px;font-weight:700;fill:#111}
    .lb{font-size:11px;fill:#111}
    .sm{font-size:10px;fill:#444}
    .st{fill:#eaf1fb;stroke:#1f3a93;stroke-width:1.4}
    .stE{fill:#fef7f0;stroke:#c0392b;stroke-width:1.4}
    .stG{fill:#f0f6f0;stroke:#1e7c39;stroke-width:1.4}
    .arr{stroke:#222;stroke-width:1.2;fill:none}
  </style>

  <text x="440" y="22" text-anchor="middle" class="ttl">Fig. 14  Work-Order State Machine (FN-020 ~ FN-024)</text>

  <rect x="40" y="80" width="130" height="50" rx="6" class="st"/>
  <text x="105" y="100" text-anchor="middle" class="lb">DRAFT</text>
  <text x="105" y="118" text-anchor="middle" class="sm">FN-020 created</text>

  <rect x="220" y="80" width="130" height="50" rx="6" class="st"/>
  <text x="285" y="100" text-anchor="middle" class="lb">SCHEDULED</text>
  <text x="285" y="118" text-anchor="middle" class="sm">OR-Tools FN-019</text>

  <rect x="400" y="80" width="130" height="50" rx="6" class="st"/>
  <text x="465" y="100" text-anchor="middle" class="lb">IN_PROGRESS</text>
  <text x="465" y="118" text-anchor="middle" class="sm">work_results POST</text>

  <rect x="580" y="80" width="130" height="50" rx="6" class="stG"/>
  <text x="645" y="100" text-anchor="middle" class="lb">COMPLETED</text>
  <text x="645" y="118" text-anchor="middle" class="sm">progress = 100 %</text>

  <rect x="400" y="180" width="130" height="50" rx="6" class="stE"/>
  <text x="465" y="200" text-anchor="middle" class="lb">PAUSED</text>
  <text x="465" y="218" text-anchor="middle" class="sm">equipment DOWN</text>

  <rect x="580" y="180" width="130" height="50" rx="6" class="stE"/>
  <text x="645" y="200" text-anchor="middle" class="lb">CANCELLED</text>
  <text x="645" y="218" text-anchor="middle" class="sm">manager override</text>

  <line x1="170" y1="105" x2="220" y2="105" class="arr" marker-end="url(#arr14)"/>
  <text x="195" y="98" text-anchor="middle" class="sm">submit</text>

  <line x1="350" y1="105" x2="400" y2="105" class="arr" marker-end="url(#arr14)"/>
  <text x="375" y="98" text-anchor="middle" class="sm">start</text>

  <line x1="530" y1="105" x2="580" y2="105" class="arr" marker-end="url(#arr14)"/>
  <text x="555" y="98" text-anchor="middle" class="sm">finish</text>

  <line x1="465" y1="130" x2="465" y2="180" class="arr" marker-end="url(#arr14)"/>
  <text x="475" y="160" class="sm">FN-032 status=DOWN</text>

  <line x1="465" y1="180" x2="465" y2="135" class="arr" marker-end="url(#arr14)"/>
  <text x="380" y="160" text-anchor="end" class="sm">resume</text>

  <line x1="530" y1="205" x2="580" y2="205" class="arr" marker-end="url(#arr14)"/>
  <text x="555" y="198" text-anchor="middle" class="sm">cancel</text>

  <!-- side effects -->
  <rect x="40" y="260" width="800" height="100" rx="4" fill="#fff" stroke="#222"/>
  <text x="50" y="280" class="lb">Side effects per transition</text>
  <text x="50" y="298" class="sm">DRAFT → SCHEDULED       :  insert into work_orders (status, equip_code, scheduled_at, makespan_min)</text>
  <text x="50" y="312" class="sm">SCHEDULED → IN_PROGRESS  :  set start_time = NOW(), update equip_status_log (RUNNING), broadcast WS event</text>
  <text x="50" y="326" class="sm">IN_PROGRESS → COMPLETED  :  recompute progress_pct, write inventory_transactions (out=raw, in=product), trigger Q-check</text>
  <text x="50" y="340" class="sm">IN_PROGRESS → PAUSED     :  log downtime_minutes, deduct from OEE Availability, push CRITICAL alert</text>
  <text x="50" y="354" class="sm">* → CANCELLED            :  release reserved inventory, revert plan progress, audit-log who/when/why</text>
</svg>
