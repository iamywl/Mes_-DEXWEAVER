<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 420" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arr8" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#222"/>
    </marker>
    <symbol id="ic-jenkins" viewBox="-50 -50 100 100">
      <ellipse cx="0" cy="-12" rx="22" ry="26" fill="#F0DDB1"/>
      <path d="M-22,-18 Q-22,-44 0,-44 Q22,-44 22,-18 Q22,-30 0,-32 Q-22,-30 -22,-18 Z" fill="#111"/>
      <circle cx="-9"  cy="-12" r="2.5" fill="#111"/>
      <circle cx="9"   cy="-12" r="2.5" fill="#111"/>
      <path d="M-22,18 Q0,28 22,18 L24,42 L-24,42 Z" fill="#D33833"/>
      <rect x="-3" y="20" width="6" height="22" fill="#fff"/>
    </symbol>
    <symbol id="ic-git" viewBox="-50 -50 100 100">
      <rect x="-40" y="-40" width="80" height="80" rx="8" fill="#F05033" transform="rotate(45)"/>
      <circle cx="0"   cy="-18" r="6" fill="#fff"/>
      <circle cx="-18" cy="6"   r="6" fill="#fff"/>
      <circle cx="18"  cy="6"   r="6" fill="#fff"/>
      <line x1="0" y1="-12" x2="0" y2="6" stroke="#fff" stroke-width="3"/>
      <line x1="0" y1="6" x2="-12" y2="6" stroke="#fff" stroke-width="3"/>
      <line x1="0" y1="6" x2="12" y2="6" stroke="#fff" stroke-width="3"/>
    </symbol>
    <symbol id="ic-k8s" viewBox="-50 -50 100 100">
      <polygon points="0,-44 38,-22 38,22 0,44 -38,22 -38,-22" fill="#326CE5" stroke="#fff" stroke-width="3"/>
      <circle cx="0" cy="0" r="14" fill="none" stroke="#fff" stroke-width="2.5"/>
      <g stroke="#fff" stroke-width="2.5">
        <line x1="0" y1="-14" x2="0" y2="-32"/>
        <line x1="14" y1="0" x2="32" y2="0"/>
        <line x1="0" y1="14" x2="0" y2="32"/>
        <line x1="-14" y1="0" x2="-32" y2="0"/>
      </g>
    </symbol>
    <symbol id="ic-docker" viewBox="-50 -50 100 100">
      <g fill="#2496ED">
        <rect x="-26" y="-2"  width="12" height="12"/>
        <rect x="-12" y="-2"  width="12" height="12"/>
        <rect x="2"   y="-2"  width="12" height="12"/>
        <rect x="-12" y="-16" width="12" height="12"/>
        <rect x="2"   y="-16" width="12" height="12"/>
        <rect x="-12" y="-30" width="12" height="12"/>
        <path d="M-44,12 Q-30,28 0,28 Q30,28 38,8 L42,12 Q40,30 22,38 L-30,38 Q-46,30 -46,16 Z"/>
      </g>
    </symbol>
    <symbol id="ic-python" viewBox="-50 -50 100 100">
      <path d="M0,-40 Q-30,-40 -30,-15 V-5 H10 V0 H-30 Q-40,0 -40,10 V25 Q-40,40 -15,40 H5 V25 Q5,15 15,15 H35 Q40,15 40,5 V-15 Q40,-40 0,-40 Z" fill="#3776AB"/>
      <path d="M0,40 Q30,40 30,15 V5 H-10 V0 H30 Q40,0 40,-10 V-25 Q40,-40 15,-40 H-5 V-25 Q-5,-15 -15,-15 H-35 Q-40,-15 -40,-5 V15 Q-40,40 0,40 Z" fill="#FFD43B" opacity="0.95"/>
    </symbol>
  </defs>
  <style>
    .ttl{font-size:13px;font-weight:700;fill:#111}
    .lb{font-size:11px;fill:#111}
    .sm{font-size:10px;fill:#444}
    .stage{fill:#eaf1fb;stroke:#1f3a93;stroke-width:1.2}
    .ok{fill:#f0f6f0;stroke:#1e7c39;stroke-width:1.2}
    .out{fill:#fef7f0;stroke:#c0392b;stroke-width:1.2}
    .arr{stroke:#222;stroke-width:1.2;fill:none}
  </style>

  <text x="460" y="22" text-anchor="middle" class="ttl">Fig. 8  GitOps CI/CD Pipeline — Git → Jenkins → ConfigMap-based deploy on K8s</text>

  <!-- top row: dev, git, jenkins -->
  <rect x="20" y="60" width="130" height="60" rx="4" class="stage"/>
  <use href="#ic-python" x="28" y="68" width="44" height="44"/>
  <text x="105" y="82" text-anchor="middle" class="lb">Developer</text>
  <text x="105" y="98" text-anchor="middle" class="sm">git commit / push</text>
  <text x="105" y="112" text-anchor="middle" class="sm">PR review</text>

  <rect x="190" y="60" width="130" height="60" rx="4" class="stage"/>
  <use href="#ic-git" x="198" y="68" width="44" height="44"/>
  <text x="275" y="82" text-anchor="middle" class="lb">Git Repository</text>
  <text x="275" y="98" text-anchor="middle" class="sm">main / feature/*</text>
  <text x="275" y="112" text-anchor="middle" class="sm">webhook → Jenkins</text>

  <rect x="360" y="60" width="130" height="60" rx="4" class="stage"/>
  <use href="#ic-jenkins" x="368" y="68" width="44" height="44"/>
  <text x="445" y="82" text-anchor="middle" class="lb">Jenkins</text>
  <text x="445" y="98" text-anchor="middle" class="sm">Pipeline-as-Code</text>
  <text x="445" y="112" text-anchor="middle" class="sm">parallel agents</text>

  <line x1="150" y1="90" x2="190" y2="90" class="arr" marker-end="url(#arr8)"/>
  <line x1="320" y1="90" x2="360" y2="90" class="arr" marker-end="url(#arr8)"/>
  <line x1="445" y1="120" x2="445" y2="170" class="arr" marker-end="url(#arr8)"/>
  <text x="455" y="155" class="sm">trigger pipeline</text>

  <!-- pipeline stages -->
  <rect x="20" y="180" width="130" height="60" rx="4" class="ok"/>
  <text x="85" y="200" text-anchor="middle" class="lb">① Lint</text>
  <text x="85" y="218" text-anchor="middle" class="sm">flake8 · eslint</text>
  <text x="85" y="232" text-anchor="middle" class="sm">prettier · isort</text>

  <rect x="170" y="180" width="130" height="60" rx="4" class="ok"/>
  <text x="235" y="200" text-anchor="middle" class="lb">② Test</text>
  <text x="235" y="218" text-anchor="middle" class="sm">pytest · vitest</text>
  <text x="235" y="232" text-anchor="middle" class="sm">cov ≥ 70 %</text>

  <rect x="320" y="180" width="130" height="60" rx="4" class="ok"/>
  <text x="385" y="200" text-anchor="middle" class="lb">③ Security scan</text>
  <text x="385" y="218" text-anchor="middle" class="sm">bandit · trivy</text>
  <text x="385" y="232" text-anchor="middle" class="sm">CVE block</text>

  <rect x="470" y="180" width="130" height="60" rx="4" class="ok"/>
  <text x="535" y="200" text-anchor="middle" class="lb">④ Build artifact</text>
  <text x="535" y="218" text-anchor="middle" class="sm">vite build</text>
  <text x="535" y="232" text-anchor="middle" class="sm">tar.gz · 8 MB</text>

  <rect x="620" y="180" width="140" height="60" rx="4" class="ok"/>
  <use href="#ic-k8s" x="628" y="188" width="36" height="36"/>
  <text x="710" y="200" text-anchor="middle" class="lb">⑤ kubectl apply</text>
  <text x="710" y="218" text-anchor="middle" class="sm">kustomize -k</text>
  <text x="710" y="232" text-anchor="middle" class="sm">ConfigMap rotate</text>

  <rect x="780" y="180" width="130" height="60" rx="4" class="out"/>
  <use href="#ic-k8s" x="788" y="188" width="36" height="36"/>
  <text x="855" y="200" text-anchor="middle" class="lb">⑥ Rollout restart</text>
  <text x="855" y="218" text-anchor="middle" class="sm">RollingUpdate</text>
  <text x="855" y="232" text-anchor="middle" class="sm">0 ms downtime</text>

  <line x1="150" y1="210" x2="170" y2="210" class="arr" marker-end="url(#arr8)"/>
  <line x1="300" y1="210" x2="320" y2="210" class="arr" marker-end="url(#arr8)"/>
  <line x1="450" y1="210" x2="470" y2="210" class="arr" marker-end="url(#arr8)"/>
  <line x1="600" y1="210" x2="620" y2="210" class="arr" marker-end="url(#arr8)"/>
  <line x1="760" y1="210" x2="780" y2="210" class="arr" marker-end="url(#arr8)"/>

  <!-- gates -->
  <rect x="20" y="280" width="890" height="120" rx="4" fill="#fff" stroke="#222"/>
  <text x="30" y="300" class="lb">Quality gates &amp; metrics (paper-style notes)</text>
  <text x="30" y="320" class="sm">▸ Coverage threshold ≥ 70 % blocks merge      ▸ Critical CVE in trivy report fails the pipeline      ▸ Mean pipeline time : 90 s ↓ from 14 min</text>
  <text x="30" y="338" class="sm">▸ Build artefact (~8 MB tar) mounted into Pod via ConfigMap → Docker image build skipped (ConfigMap-based deployment pattern, see Dockerfile.api for full-image fallback)</text>
  <text x="30" y="356" class="sm">▸ kubectl rollout status waits for readiness probe ; Jenkins marks build green only after 3 / 3 Pods healthy</text>
  <text x="30" y="374" class="sm">▸ Rollback : `kubectl rollout undo deploy/mes-api`  — single command, &lt; 30 s</text>
  <text x="30" y="392" class="sm">▸ Optional Docker image build (Dockerfile.api / Dockerfile) for offline registry deployment, pushed to internal harbor.</text>
</svg>
