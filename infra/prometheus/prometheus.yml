# Prometheus 설정 — DEXWEAVER MES v6.0

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

rule_files:
  - "alert_rules.yml"

scrape_configs:
  # ── MES API (FastAPI + prometheus-fastapi-instrumentator) ──
  - job_name: "mes-api"
    metrics_path: /metrics
    scrape_interval: 10s
    static_configs:
      - targets: ["mes-api:8000"]
        labels:
          service: "mes-api"
          environment: "dev"

  # ── Prometheus 자체 메트릭 ──
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
