# 주의: 실제 프로덕션에서는 External Secrets Operator 또는 Sealed Secrets 사용
# 아래는 구조 템플릿이며 실제 값은 CI/CD에서 주입
apiVersion: v1
kind: Secret
metadata:
  name: mes-secrets
  namespace: mes-production
type: Opaque
stringData:
  DATABASE_HOST: "postgres"
  DATABASE_PORT: "5432"
  DATABASE_USER: "mes_admin"
  DATABASE_PASSWORD: "CHANGE_ME"
  DATABASE_NAME: "mes_db"
  REDIS_URL: "redis://:CHANGE_ME@mes-redis-service:6379/0"
  JWT_SECRET: "CHANGE_ME_TO_RANDOM_256BIT_KEY"
  POSTGRES_USER: "mes_admin"
  POSTGRES_PASSWORD: "CHANGE_ME"
  REDIS_PASSWORD: "CHANGE_ME"
