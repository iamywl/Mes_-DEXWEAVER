version: "3.8"

services:
  postgres:
    image: postgres:15
    container_name: mes-postgres
    environment:
      POSTGRES_DB: mes_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mes1234
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: always

  redis:
    image: redis:7-alpine
    container_name: mes-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: always

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mes-api
    environment:
      DATABASE_URL: postgresql://postgres:mes1234@postgres:5432/mes_db
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: "http://localhost:3000,http://localhost:30173"
      JWT_SECRET: ${JWT_SECRET:-dexweaver-mes-secret-key}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mes-frontend
    ports:
      - "3000:80"
    depends_on:
      - api
    restart: always

volumes:
  pgdata:
